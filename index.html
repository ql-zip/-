<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Responsive Page</title>
    <style>
      :root {
        --bg: #f5f7fb;
        --surface: #ffffff;
        --text: #1c2430;
        --muted: #5e6a7d;
        --primary: #1b6bff;
        --border: #dfe5ef;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background: linear-gradient(180deg, #edf2ff 0%, var(--bg) 40%, #f7fbff 100%);
      }

      .container {
        width: min(1000px, 92vw);
        margin: 0 auto;
      }

      header {
        padding: 48px 0 24px;
      }

      .hero {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 32px;
        box-shadow: 0 10px 30px rgba(15, 40, 80, 0.08);
      }

      .hero h1 {
        margin: 0 0 12px;
        font-size: clamp(1.6rem, 3.4vw, 2.5rem);
      }

      .hero p {
        margin: 0 0 18px;
        color: var(--muted);
        line-height: 1.7;
      }

      .hero a {
        display: inline-block;
        background: var(--primary);
        color: #fff;
        text-decoration: none;
        border-radius: 10px;
        padding: 10px 16px;
        font-weight: 600;
      }

      main {
        padding: 8px 0 48px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 18px;
      }

      .card h2 {
        margin: 0 0 8px;
        font-size: 1.1rem;
      }

      .card p {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
      }

      footer {
        padding: 12px 0 36px;
        color: var(--muted);
        text-align: center;
        font-size: 0.9rem;
      }

      @media (max-width: 900px) {
        .grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      @media (max-width: 640px) {
        header {
          padding-top: 28px;
        }

        .hero {
          padding: 22px;
        }

        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header class="container">
      <section class="hero">
        <h1>响应式网页示例</h1>
        <p>
          这个页面支持桌面与移动端自适应布局。你可以直接在当前工程基础上替换内容，用作产品介绍页或个人主页起点。
        </p>
        <a href="#features">查看功能</a>
      </section>
    </header>

    <main class="container" id="features">
      <section class="grid">
        <article class="card">
          <h2>自适应布局</h2>
          <p>使用 Grid 和断点，在不同屏幕上自动切换列数。</p>
        </article>
        <article class="card">
          <h2>可读性优先</h2>
          <p>通过清晰层级、适中的行距与留白，保证阅读体验。</p>
        </article>
        <article class="card">
          <h2>便于扩展</h2>
          <p>结构简洁，适合继续添加导航、表单或接口数据展示。</p>
        </article>
      </section>
    </main>

    <footer class="container">
      <p>Built for this project • 2026</p>
    </footer>
  </body>
</html>
